<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f0f2f5;--card:#fff;--text:#1a1a2e;--sub:#5a5a7a;--red:#dc2626;--green:#16a34a;--red-bg:rgba(220,38,38,.08);--green-bg:rgba(22,163,74,.08);--border:#e5e7eb;--accent:#2563eb;--accent-bg:rgba(37,99,235,.06);--gold:#d97706;--gold-bg:rgba(217,119,6,.06)}
@media(prefers-color-scheme:dark){:root{--bg:#0a0a14;--card:#141422;--text:#e8e8f0;--sub:#8888a8;--red:#f87171;--green:#4ade80;--red-bg:rgba(248,113,113,.1);--green-bg:rgba(74,222,128,.1);--border:#2a2a3e;--accent:#60a5fa;--accent-bg:rgba(96,165,250,.08);--gold:#fbbf24;--gold-bg:rgba(251,191,36,.08)}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);line-height:1.7}
.container{max-width:960px;margin:0 auto;padding:20px 16px}
a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}
.back{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:var(--card);border:1px solid var(--border);border-radius:8px;font-size:.9rem;margin-bottom:20px;transition:.2s}.back:hover{background:var(--accent);color:#fff;border-color:var(--accent)}

.section{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:20px}.section-title{font-size:1.25rem;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}.section-title .icon{font-size:1.3rem}
table{width:100%;border-collapse:collapse;font-size:.9rem}th{background:var(--accent-bg);color:var(--accent);font-weight:600;padding:10px 12px;text-align:left;border-bottom:2px solid var(--border)}td{padding:10px 12px;border-bottom:1px solid var(--border)}tr:last-child td{border-bottom:none}.up{color:var(--red);font-weight:600}.down{color:var(--green);font-weight:600}.up-bg{background:var(--red-bg)}.down-bg{background:var(--green-bg)}
.stock-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin:16px 0}.stock-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px;transition:.2s}.stock-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.08)}.stock-card .name{font-weight:700;font-size:.95rem;margin-bottom:4px}.stock-card .code{font-size:.75rem;color:var(--sub)}.stock-card .price{font-size:1.2rem;font-weight:800;margin:6px 0}.stock-card .change{font-size:.85rem;font-weight:600;padding:2px 8px;border-radius:4px;display:inline-block}
.hot-item{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:14px}.hot-item .hot-title{font-weight:700;font-size:1.05rem;margin-bottom:8px;display:flex;align-items:center;gap:6px}.hot-item .hot-tag{font-size:.75rem;padding:2px 10px;border-radius:12px;font-weight:600}.tag-policy{background:#dbeafe;color:#2563eb}.tag-capital{background:#fef3c7;color:#d97706}.tag-industry{background:#d1fae5;color:#059669}.tag-geo{background:#fce7f3;color:#db2777}.tag-defense{background:#fee2e2;color:#dc2626}.tag-tech{background:#ede9fe;color:#7c3aed}
.detail{font-size:.9rem;color:var(--sub);margin:6px 0;line-height:1.6}.detail strong{color:var(--text)}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin:14px 0}.stat-item{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center}.stat-item .s-label{font-size:.8rem;color:var(--sub);margin-bottom:4px}.stat-item .s-value{font-size:1.15rem;font-weight:700}
.outlook-box{background:var(--gold-bg);border:1px solid var(--gold);border-radius:12px;padding:20px;margin:14px 0}.outlook-box h4{color:var(--gold);margin-bottom:8px}.outlook-box ul{margin-left:20px}.outlook-box li{margin-bottom:6px;font-size:.92rem}
.trend-grid{display:grid;grid-template-columns:1fr;gap:14px;margin:18px 0}.trend-card{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:18px;position:relative;overflow:hidden}.trend-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;border-radius:4px 0 0 4px}.trend-card.bullish::before{background:var(--red)}.trend-card.bearish::before{background:var(--green)}.trend-card.neutral::before{background:var(--gold)}.trend-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px}.trend-name{font-weight:800;font-size:1.05rem}.trend-badge{font-size:.78rem;padding:3px 12px;border-radius:16px;font-weight:700}.badge-bull{background:var(--red-bg);color:var(--red)}.badge-bear{background:var(--green-bg);color:var(--green)}.badge-neutral{background:var(--gold-bg);color:var(--gold)}.trend-metrics{display:flex;gap:16px;flex-wrap:wrap;margin:8px 0 10px;font-size:.85rem}.trend-metrics span{display:flex;align-items:center;gap:4px}.trend-metrics .label{color:var(--sub);font-weight:500}.trend-metrics .value{font-weight:700}.trend-analysis{font-size:.88rem;line-height:1.7;color:var(--sub)}.trend-analysis strong{color:var(--text)}.trend-levels{display:flex;gap:12px;flex-wrap:wrap;margin:8px 0;font-size:.85rem}.trend-levels .lv{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 12px}.trend-levels .lv .lv-label{color:var(--sub);font-size:.78rem}.trend-levels .lv .lv-val{font-weight:700;font-size:.95rem}.trend-target{margin-top:8px;font-size:.85rem;color:var(--sub)}.trend-target strong{color:var(--text)}.trend-stars{color:#fbbf24;font-size:1.1rem;margin-top:4px}
footer{text-align:center;padding:30px 20px;color:var(--sub);font-size:.85rem;border-top:1px solid var(--border);margin-top:24px}
</style>
