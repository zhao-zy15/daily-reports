<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>arXiv AI 论文日报</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            color: #1a1a2e;
            min-height: 100vh;
            padding: 20px;
        }
        @media (prefers-color-scheme: dark) {
            body { background: #0f0f1a; color: #f5f7fa; }
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { font-size: 1.5rem; margin-bottom: 10px; }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            color: #4f46e5;
            text-decoration: none;
            margin-bottom: 20px;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6b7280;
        }
        .empty-state .icon { font-size: 3rem; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="../" class="back-link">← 返回首页</a>
        <h1>📄 arXiv AI 论文日报</h1>
        <div class="empty-state">
            <div class="icon">📚</div>
            <p>报告即将生成...</p>
            <p style="margin-top: 10px; font-size: 0.9rem;">工作日 11:00 自动更新</p>
        </div>
    </div>
</body>
</html>
