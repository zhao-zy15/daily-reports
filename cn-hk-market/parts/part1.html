<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A股港股收盘总结 · 2026-04-08</title>
<style>
:root{--bg:#0b0e17;--bg2:#141825;--bg3:#1c2035;--card:#181c2f;--border:#2a2e45;--text:#e8e8f0;--text2:#9a9ab8;--red:#ef4444;--red-bg:rgba(239,68,68,0.12);--green:#22c55e;--green-bg:rgba(34,197,94,0.12);--gold:#f59e0b;--gold-bg:rgba(245,158,11,0.12);--blue:#3b82f6;--blue-bg:rgba(59,130,246,0.12);--accent:#818cf8;--accent2:#c084fc}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;min-height:100vh}
.container{max-width:1100px;margin:0 auto;padding:20px 16px 60px}
a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}
.back-link{display:inline-flex;align-items:center;gap:6px;font-size:.9rem;padding:8px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:24px;transition:.3s}
.back-link:hover{background:var(--accent);color:#fff;text-decoration:none}
header{text-align:center;padding:40px 24px;margin-bottom:30px;background:linear-gradient(135deg,#1a1040 0%,#0f172a 50%,#1a0a2e 100%);border-radius:20px;border:1px solid var(--border);position:relative;overflow:hidden}
header::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 50%,rgba(129,140,248,0.08),transparent 50%),radial-gradient(circle at 70% 50%,rgba(239,68,68,0.06),transparent 50%);animation:pulse 8s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
header *{position:relative;z-index:1}
.header-icon{font-size:3.5rem;margin-bottom:12px}
h1{font-size:2rem;font-weight:800;background:linear-gradient(135deg,#ef4444,#f59e0b,#ef4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.header-date{color:var(--text2);font-size:1rem}
.header-tag{display:inline-block;margin-top:12px;padding:4px 16px;background:rgba(239,68,68,0.2);border:1px solid rgba(239,68,68,0.3);border-radius:20px;font-size:.85rem;color:#f87171;font-weight:600}
.section{margin-bottom:32px}
.section-title{font-size:1.35rem;font-weight:700;padding-bottom:12px;margin-bottom:20px;border-bottom:2px solid var(--border);display:flex;align-items:center;gap:10px}
.section-title .icon{font-size:1.3rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px;margin-bottom:16px;transition:.3s}
.card:hover{border-color:var(--accent);box-shadow:0 4px 20px rgba(129,140,248,0.1)}
.index-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px}
.idx-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.idx-name{font-size:.9rem;color:var(--text2);margin-bottom:4px}
.idx-val{font-size:1.5rem;font-weight:800;margin-bottom:2px}
.idx-chg{font-size:1rem;font-weight:700;padding:2px 10px;border-radius:6px;display:inline-block}
.idx-chg.up{color:var(--red);background:var(--red-bg)}
.idx-chg.dn{color:var(--green);background:var(--green-bg)}
.idx-vol{font-size:.8rem;color:var(--text2);margin-top:6px}
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-top:16px}
.stat-item{background:var(--bg2);border-radius:10px;padding:14px;text-align:center}
.stat-label{font-size:.8rem;color:var(--text2)}
.stat-value{font-size:1.2rem;font-weight:700;margin-top:4px}
.stat-value.red{color:var(--red)}.stat-value.green{color:var(--green)}.stat-value.gold{color:var(--gold)}
.sector-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.sector-tag{padding:6px 14px;border-radius:8px;font-size:.85rem;font-weight:600}
.sector-tag.hot{background:var(--red-bg);color:#f87171;border:1px solid rgba(239,68,68,0.2)}
.sector-tag.cold{background:var(--green-bg);color:#4ade80;border:1px solid rgba(34,197,94,0.2)}
.stock-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:0;margin-bottom:16px;overflow:hidden;display:flex;transition:.3s}
.stock-card:hover{border-color:rgba(255,255,255,0.2);transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,0.3)}
.stock-bar{width:5px;flex-shrink:0}
.stock-bar.bullish{background:linear-gradient(180deg,#ef4444,#dc2626)}
.stock-bar.bearish{background:linear-gradient(180deg,#22c55e,#16a34a)}
.stock-bar.neutral{background:linear-gradient(180deg,#f59e0b,#d97706)}
.stock-bar.recommend{background:linear-gradient(180deg,#3b82f6,#2563eb)}
.stock-body{flex:1;padding:20px;position:relative}
.stock-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.stock-name{font-size:1.15rem;font-weight:700}
.stock-code{font-size:.8rem;color:var(--text2);margin-top:2px}
.stock-badge{font-size:.75rem;padding:3px 10px;border-radius:6px;font-weight:600}
.badge-bull{background:var(--red-bg);color:#f87171}
.badge-bear{background:var(--green-bg);color:#4ade80}
.badge-neutral{background:var(--gold-bg);color:#fbbf24}
.badge-recommend{background:var(--blue-bg);color:#60a5fa;position:absolute;top:12px;right:16px;font-size:.8rem;padding:4px 12px;border-radius:8px}
.stock-price{display:flex;align-items:baseline;gap:10px;margin-bottom:10px}
.stock-price .price{font-size:1.6rem;font-weight:800}
.stock-price .change{font-size:1rem;font-weight:700;padding:2px 10px;border-radius:6px}
.stock-price .change.up{color:var(--red);background:var(--red-bg)}
.stock-price .change.dn{color:var(--green);background:var(--green-bg)}
.stock-price .change.flat{color:var(--gold);background:var(--gold-bg)}
.stock-data{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;background:var(--bg2);border-radius:10px;padding:12px}
.stock-data .item{text-align:center}
.stock-data .label{font-size:.72rem;color:var(--text2)}
.stock-data .val{font-size:.9rem;font-weight:600;margin-top:2px}
.stock-info{margin-bottom:12px}
.stock-info h4{font-size:.85rem;color:var(--accent);margin-bottom:6px}
.stock-info p{font-size:.85rem;color:var(--text2);line-height:1.6}
.stock-tech{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.tech-item{background:var(--bg2);border-radius:8px;padding:10px;text-align:center}
.tech-item .lbl{font-size:.72rem;color:var(--text2)}
.tech-item .val{font-size:.95rem;font-weight:700;margin-top:2px}
.tech-item .val.red{color:var(--red)}.tech-item .val.green{color:var(--green)}
.stock-bottom{display:flex;justify-content:space-between;align-items:center;padding-top:12px;border-top:1px solid var(--border)}
.target-price{font-size:.82rem;color:var(--text2)}.target-price span{color:var(--gold);font-weight:700}
.star-rating{color:var(--gold);font-size:1.05rem;letter-spacing:2px}
.msg-card{background:var(--bg2);border-left:3px solid var(--accent);border-radius:0 10px 10px 0;padding:14px 18px;margin-bottom:10px}
.msg-card .time{font-size:.75rem;color:var(--text2);margin-bottom:4px}
.msg-card .content{font-size:.9rem}
.outlook-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:700px){.outlook-grid{grid-template-columns:1fr}.stock-data{grid-template-columns:repeat(2,1fr)}}
.outlook-card{background:var(--bg2);border-radius:12px;padding:18px}
.outlook-card h4{font-size:.95rem;margin-bottom:10px}
.outlook-card ul{list-style:none;padding:0}
.outlook-card li{font-size:.85rem;color:var(--text2);padding:4px 0 4px 16px;position:relative}
.outlook-card li::before{content:'▸';position:absolute;left:0;color:var(--accent)}
.disclaimer{text-align:center;color:var(--text2);font-size:.78rem;margin-top:40px;padding:20px;border-top:1px solid var(--border)}
</style>
</head>
