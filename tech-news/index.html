<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科技与财经每日动态</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-primary: #f5f7fa;
            --bg-secondary: #ffffff;
            --text-primary: #1a1a2e;
            --text-secondary: #4a4a6a;
            --accent: #0ea5e9;
            --accent-hover: #0284c7;
            --border: #e5e7eb;
            --shadow: rgba(0, 0, 0, 0.1);
        }
        
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #0f0f1a;
                --bg-secondary: #1a1a2e;
                --text-primary: #f5f7fa;
                --text-secondary: #a0a0b8;
                --accent: #38bdf8;
                --accent-hover: #0ea5e9;
                --border: #2d2d44;
                --shadow: rgba(0, 0, 0, 0.3);
            }
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--accent);
            text-decoration: none;
            font-size: 0.95rem;
            margin-bottom: 20px;
            padding: 8px 16px;
            background: var(--bg-secondary);
            border-radius: 8px;
            border: 1px solid var(--border);
            transition: all 0.3s;
        }
        
        .back-link:hover {
            background: var(--accent);
            color: white;
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: var(--bg-secondary);
            border-radius: 16px;
            border: 1px solid var(--border);
        }
        
        .header-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }
        
        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--accent), #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            color: var(--text-secondary);
        }
        
        .latest-report {
            background: linear-gradient(135deg, #0ea5e9, #3b82f6);
            border-radius: 16px;
            padding: 25px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(14, 165, 233, 0.3);
        }
        
        .latest-report .info {
            color: white;
        }
        
        .latest-report .label {
            font-size: 0.85rem;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        
        .latest-report .title {
            font-weight: 700;
            font-size: 1.4rem;
        }
        
        .latest-report .btn {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .latest-report .btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateX(5px);
        }
        
        .history-section {
            background: var(--bg-secondary);
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
        }
        
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 25px;
            background: var(--bg-primary);
            cursor: pointer;
            user-select: none;
        }
        
        .history-header h2 {
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .history-header .toggle {
            font-size: 0.9rem;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .history-header .toggle .arrow {
            transition: transform 0.3s;
        }
        
        .history-header.collapsed .toggle .arrow {
            transform: rotate(-90deg);
        }
        
        .history-list {
            list-style: none;
            max-height: 400px;
            overflow-y: auto;
            transition: max-height 0.3s ease;
        }
        
        .history-list.collapsed {
            max-height: 0;
            overflow: hidden;
        }
        
        .history-list li {
            border-bottom: 1px solid var(--border);
        }
        
        .history-list li:last-child {
            border-bottom: none;
        }
        
        .history-list li a {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 25px;
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.2s;
        }
        
        .history-list li a:hover {
            background: var(--bg-primary);
            padding-left: 30px;
        }
        
        .history-list .date-info {
            display: flex;
            flex-direction: column;
        }
        
        .history-list .date {
            font-weight: 600;
            font-size: 1.05rem;
        }
        
        .history-list .weekday {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        
        .history-list .summary {
            font-size: 0.9rem;
            color: var(--text-secondary);
            background: var(--bg-primary);
            padding: 4px 12px;
            border-radius: 20px;
            max-width: 200px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .history-list::-webkit-scrollbar {
            width: 8px;
        }
        
        .history-list::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        
        .history-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
        
        .history-list::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        
        .empty-state .icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }
        
        footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 1.6rem;
            }
            
            .latest-report {
                flex-direction: column;
                gap: 20px;
                text-align: center;
            }
            
            .history-list li a {
                flex-direction: column;
                gap: 8px;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="../" class="back-link">← 返回报告中心</a>
        
        <header>
            <div class="header-icon">🤖</div>
            <h1>科技与 AI 每日动态</h1>
            <p class="subtitle">聚焦 AI、具身智能、脑机接口及全球科技巨头最新动向</p>
        </header>
        
        <div class="latest-report">
            <div class="info">
                <div class="label">📅 最新报告</div>
                <div class="title">2026-03-19</div>
            </div>
            <a href="report-2026-03-19.html" class="btn">
                查看完整报告 →
            </a>
        </div>
        
        <div class="history-section">
            <div class="history-header" onclick="toggleHistory(this)">
                <h2>📚 历史报告</h2>
                <span class="toggle"><span class="arrow">▼</span> 收起</span>
            </div>
            <ul class="history-list">
                <li>
                    <a href="report-2026-03-19.html">
                        <div class="date-info">
                            <span class="date">2026-03-19</span>
                            <span class="weekday">周四</span>
                        </div>
                        <span class="summary">英伟达营收预期破400亿 / 苹果AI iPhone发力 / Kimi估值200亿</span>
                    </a>
                </li>
            </ul>
        </div>
        
        <footer>
            <p>每天 18:00 自动更新 · 由 WorkBuddy 生成</p>
        </footer>
    </div>
    
    <script>
        function toggleHistory(header) {
            header.classList.toggle('collapsed');
            const list = header.nextElementSibling;
            list.classList.toggle('collapsed');
            
            const toggleText = header.querySelector('.toggle');
            if (header.classList.contains('collapsed')) {
                toggleText.innerHTML = '<span class="arrow">▼</span> 展开';
            } else {
                toggleText.innerHTML = '<span class="arrow">▼</span> 收起';
            }
        }
    </script>
</body>
</html>
