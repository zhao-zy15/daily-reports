<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日报告中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-primary: #f5f7fa;
            --bg-secondary: #ffffff;
            --text-primary: #1a1a2e;
            --text-secondary: #4a4a6a;
            --accent: #4f46e5;
            --accent-hover: #4338ca;
            --border: #e5e7eb;
            --shadow: rgba(0, 0, 0, 0.1);
        }
        
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #0f0f1a;
                --bg-secondary: #1a1a2e;
                --text-primary: #f5f7fa;
                --text-secondary: #a0a0b8;
                --accent: #818cf8;
                --accent-hover: #6366f1;
                --border: #2d2d44;
                --shadow: rgba(0, 0, 0, 0.3);
            }
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 50px;
        }
        
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--accent), #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }
        
        .update-time {
            margin-top: 15px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        
        .reports-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }
        
        .report-card {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 20px var(--shadow);
            border: 1px solid var(--border);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .report-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px var(--shadow);
        }
        
        .report-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 20px;
        }
        
        .report-card.iran .report-icon {
            background: linear-gradient(135deg, #ef4444, #f97316);
        }
        
        .report-card.arxiv .report-icon {
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
        }
        
        .report-card h2 {
            font-size: 1.4rem;
            margin-bottom: 10px;
        }
        
        .report-card p {
            color: var(--text-secondary);
            margin-bottom: 20px;
        }
        
        .report-meta {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        
        .report-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 500;
            transition: background 0.3s ease;
        }
        
        .btn:hover {
            background: var(--accent-hover);
        }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        
        .status-badge.active {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }
        
        .status-badge.active::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        .latest-report {
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 10px 15px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
        }
        
        .latest-report .label {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        
        .latest-report .title {
            font-weight: 500;
            color: var(--accent);
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        footer {
            text-align: center;
            margin-top: 60px;
            padding: 20px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
            
            .reports-grid {
                grid-template-columns: 1fr;
            }
            
            .report-card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 每日报告中心</h1>
            <p class="subtitle">自动化信息整理与分析报告</p>
            <p class="update-time">最后更新：<span id="updateTime"></span></p>
        </header>
        
        <main class="reports-grid">
            <!-- 伊朗局势报告 -->
            <div class="report-card iran">
                <div class="report-icon">🌍</div>
                <h2>伊朗局势与大宗商品日报</h2>
                <p>追踪伊朗地缘政治动态、能源价格走势、全球市场影响分析</p>
                <div class="latest-report">
                    <div class="label">最新报告</div>
                    <div class="title">2026-03-19 16:26</div>
                </div>
                <div class="report-meta">
                    <span>🕐 每天 10:00 / 18:00</span>
                    <span class="status-badge active">运行中</span>
                </div>
                <a href="iran-commodity/" class="btn">
                    查看最新报告 →
                </a>
            </div>
            
            <!-- arXiv 论文报告 -->
            <div class="report-card arxiv">
                <div class="report-icon">📄</div>
                <h2>arXiv AI 论文日报</h2>
                <p>精选 AI 领域最新论文：LLM、Agent、信息检索等方向深度分析</p>
                <div class="latest-report">
                    <div class="label">最新报告</div>
                    <div class="title">2026-03-19</div>
                </div>
                <div class="report-meta">
                    <span>🕐 工作日 11:00</span>
                    <span class="status-badge active">运行中</span>
                </div>
                <a href="arxiv-papers/" class="btn">
                    查看最新报告 →
                </a>
            </div>
        </main>
        
        <footer>
            <p>由 WorkBuddy 自动生成 · 数据仅供参考</p>
        </footer>
    </div>
    
    <script>
        document.getElementById('updateTime').textContent = new Date().toLocaleString('zh-CN');
    </script>
</body>
</html>
