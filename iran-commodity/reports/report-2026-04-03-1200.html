<h3>1. 特朗普黄金时段全国讲话：宣称"核心战略目标接近完成"，未来2-3周猛烈打击伊朗</h3>
<p>美国总统特朗普于4月1日晚间发表黄金时段全国电视讲话，宣称美军对伊朗的"核心战略目标即将完成"，预计两到三周内结束战事。但他同时威胁若伊朗不达成协议，将打击其发电厂和石油设施，将伊朗"打回石器时代"。特朗普声称伊朗总统佩泽什基安"亲自请求停火"，此说法遭伊朗外交部通过半岛电视台强烈否认。</p>

</div>
<div class="news-card core">
<h3>2. 伊朗革命卫队声称打击迪拜Oracle数据中心和巴林亚马逊数据中心</h3>
<p>IRGC于4月2日宣布对阿联酋迪拜的Oracle数据中心和巴林亚马逊数据中心实施打击，是兑现此前将18家美国科技公司列为"合法打击目标"的首次行动。迪拜政府随后否认遭受攻击，称为"假新闻"。事件引发全球科技企业对中东设施安全的高度关注。</p>
